<div id="loginModal"
    class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4 backdrop-blur-md">

    <div class="w-full max-w-md shadow-md bg-white dark:bg-gray-800 rounded-xl p-8 space-y-4 relative">
        <button id="closeLoginBtn"
            class="absolute top-4 right-4 text-gray-500 hover:text-gray-700 dark:hover:text-white cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
        </button>

        <h2 data-key="login.title" class="text-2xl font-bold text-gray-900 dark:text-white mb-6 uppercase text-center">
            login.title</h2>

        <form id="loginForm" class="space-y-4">
            <div>
                <label data-key="login.email"
                    class="block text-sm font-medium text-red-600 dark:text-white mb-1">login.email</label>
                <input type="email" id="email" required
                    class="w-full px-5 py-2.5 rounded-sm border border-gray-900 dark:border-gray-100 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-gray-900 dark:focus:ring-gray-100" />
            </div>

            <div>
                <label data-key="login.password"
                    class="block text-sm font-medium text-red-600 dark:text-white mb-1">login.password</label>
                <div class="relative">
                    <input type="password" id="password" required
                        class="w-full px-5 py-2.5 rounded-sm border border-gray-900 dark:border-gray-100 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-gray-900 dark:focus:ring-gray-100" />

                    <button type="button" onclick="togglePasswordVisibility('password', 'loginPasswordToggleText')"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5 text-gray-600 dark:text-gray-300 cursor-pointer">
                        <span id="loginPasswordToggleText">Show</span>
                    </button>
                </div>
                <button type="button" id="switchToForgot" data-key="login.forgotpassword"
                    class="text-xs text-red-600 hover:underline cursor-pointer">
                    login.forgotpassword
                </button>
            </div>


            <button data-key="login.btn" type="submit"
                class="mt-4 w-full text-center bg-red-600 hover:bg-red-700 text-white rounded-sm px-5 py-2.5 text-sm font-medium transition">
                login.btn
            </button>
        </form>

        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
            </div>
            <div class="relative flex justify-center text-sm"><span data-key="login.or"
                    class="px-2 bg-white dark:bg-gray-800 text-gray-500">login.or</span></div>
        </div>

        <button id="googleLoginBtn"
            class=" w-full flex items-center justify-center gap-3 rounded-sm px-5 py-2.5 bg-white hover:bg-gray-50 dark:bg-gray-600 dark:hover:bg-gray-700 text-gray-900 dark:text-white border border-gray-900 dark:border-gray-100">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path fill="#4285F4"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="#34A853"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" />
                <path fill="#EA4335"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            <span data-key="login.googlebtn">login.googlebtn</span>
        </button>
        <p class="text-sm text-center text-gray-900 dark:text-white mt-4">
            <span data-key="login.switch" class="mr-4"> login.switch</span><button data-key="login.switchbtn"
                id="switchToSignup" class="text-red-600 hover:underline cursor-pointer">login.switchbtn</button>
        </p>
    </div>
</div>
