<div class="space-y-4">
    <div class="flex items-center gap-1">
        <span class="text-2xl">🍪</span>
        <h3 data-key="cookie-banner.title"
            class="text-sm font-bold tracking-wider uppercase text-gray-800 dark:text-white">
            cookie-banner.title </h3>
    </div>

    <p data-key="cookie-banner.text" class="text-xs text-gray-600 dark:text-gray-400 leading-relaxed">
        cookie-banner.text
    </p>

    <div class="flex flex-col sm:flex-row gap-2 pt-2">
        <button data-key="cookie-banner.accept" id="acceptCookies"
            class="w-full bg-red-500 hover:bg-red-600 dark:bg-red-400 dark:hover:bg-red-500 text-white dark:text-gray-950 font-bold text-xs tracking-widest uppercase py-2.5 px-4 rounded-sm transition cursor-pointer text-center">
            cookie-banner.accept
        </button>
        <button data-key="cookie-banner.decline" id="declineCookies"
            class="w-full bg-transparent hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-500 dark:text-gray-400 font-medium text-xs tracking-widest uppercase py-2.5 px-4 rounded-sm border border-gray-300 dark:border-gray-700 transition cursor-pointer text-center">
            cookie-banner.decline
        </button>
    </div>

    <div class="text-center sm:text-left">
        <a data-key="cookie-banner.privacy" href="datenschutz.html"
            class="text-[10px] text-gray-400 hover:text-red-500 dark:hover:text-red-400 underline transition">
            cookie-banner.privacy
        </a>
    </div>
</div>
