<div class="no-copy bg-gray-800 text-white shadow-sm py-8 sm:py-0">
    <div
        class="mx-auto px-4 max-w-7xl min-h-24 flex flex-col sm:grid sm:grid-cols-3 items-center justify-between gap-4 text-xs"
    >
        <p
            data-key="footer.copyright"
            class="order-2 sm:order-1 text-center sm:text-left text-white/90"
        >
            footer.copyright
        </p>

        <div class="order-1 sm:order-2 text-center">
            <p data-key="footer.created_by" class="font-bold text-white">
                footer.created_by
            </p>
        </div>

        <div class="flex gap-4 order-3 sm:justify-self-end text-white/90">
            <a
                data-key="footer.imprint"
                href="imprint"
                class="hover:underline transition duration-200"
                >footer.imprint</a
            >
            <a
                data-key="footer.privacy"
                href="privacy"
                class="hover:underline transition duration-200"
                >footer.privacy</a
            >
            <a
                data-key="footer.terms"
                href="terms"
                class="hover:underline transition duration-200"
                >footer.terms</a
            >
        </div>
    </div>
</div>
