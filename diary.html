<!doctype html>
<html class="scroll-smooth no-copy"
      lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />

    <title data-key="index.meta.title">
        Roll the Track Dice - Your Random Train Adventure
    </title>
    <meta name="index.meta.description"
          data-key="meta_description"
          content="Experience a thrilling random adventure with the Track Dice!" />
    <meta name="robots"
          content="index, follow" />
    <link rel="canonical"
          href="https://app.gleiswuerfeln.ch/" />
    <link rel="alternate"
          hreflang="de"
          href="https://app.gleiswuerfeln.ch/" />
    <link rel="alternate"
          hreflang="en"
          href="https://app.gleiswuerfeln.ch/?lang=en" />
    <link rel="alternate"
          hreflang="fr"
          href="https://app.gleiswuerfeln.ch/?lang=fr" />
    <link rel="alternate"
          hreflang="it"
          href="https://app.gleiswuerfeln.ch/?lang=it" />
    <link rel="alternate"
          hreflang="x-default"
          href="https://app.gleiswuerfeln.ch/?lang=en" />

    <link rel="icon"
          type="image/svg+xml"
          href="img/logo-track-dice.svg" />

    <link rel="manifest"
          href="manifest.json" />

    <meta name="apple-mobile-web-app-capable"
          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style"
          content="default" />
    <meta name="apple-mobile-web-app-title"
          content="Track Dice" />
    <link rel="apple-touch-icon"
          href="img/logo-512.png" />

    <meta property="og:type"
          content="website" />
    <meta property="og:title"
          data-key="index.meta.title"
          content="Roll the Track Dice - Your Random Train Adventure" />
    <meta property="og:description"
          data-key="index.meta.description"
          content="Experience a thrilling random adventure with the Track Dice!" />
    <meta property="og:url"
          content="https://app.gleiswuerfeln.ch/" />
    <meta property="og:image"
          content="https://app.gleiswuerfeln.ch/img/track-dice.jpg" />
    <meta property="og:locale"
          data-key="meta_locale"
          content="de_CH" />

    <link rel="preconnect"
          href="https://fonts.googleapis.com" />
    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400..900&display=swap"
          rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @custom-variant dark (&:where(.dark, .dark *));
            @theme {
                --font-sans: "Maven Pro", sans-serif;
            }
        </style>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <link rel="stylesheet"
          href="css/style.css" />
</head>

<body class="font-sans flex flex-col min-h-screen bg-gray-100 dark:bg-gray-900">
    <!-- navigation -->
    <header id="header"></header>
    <!-- main content -->

    <main class="flex-grow max-w-7xl w-full mx-auto pt-8 pb-8 px-4 space-y-8">

        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 dark:text-white uppercase tracking-wide">
                <span data-key="diary.title">Reisetagebuch</span>: <span id="diary-trip-name"
                      class="text-red-600">Name
                    der Reise</span>
            </h1>
            <div class="flex flex-col sm:flex-row gap-2">
                <button id="btnShareTrip"
                        class="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-900 dark:text-white rounded-sm px-4 py-2 text-sm font-medium transition cursor-pointer text-center">
                    <span data-key="diary.share_btn">Link teilen</span>
                </button>
                <a href="index.html"
                   class="bg-red-600 hover:bg-red-700 text-white rounded-sm px-4 py-2 text-sm font-medium transition text-center">
                    <span data-key="diary.back_btn">Zurück zum Würfeln</span>
                </a>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <div class="lg:col-span-1 space-y-6">
                <div class="shadow-md bg-white dark:bg-gray-800 rounded-xl p-6">
                    <h2 data-key="diary.timeline_title"
                        class="text-xl font-bold text-gray-900 dark:text-white border-b border-gray-200 dark:border-gray-700 pb-3 mb-4">
                        Deine Stationen
                    </h2>

                    <ul id="diary-timeline"
                        class="relative border-l-2 border-red-600 ml-3 space-y-8 pb-4">

                        <li class="pl-6 relative">
                            <div class="absolute w-4 h-4 bg-red-600 rounded-full border-2 border-white dark:border-gray-800 -left-[9px] top-1">
                            </div>

                            <h3 class="font-bold text-gray-900 dark:text-white">Bern Hauptbahnhof</h3>
                            <p class="text-sm text-gray-600 dark:text-gray-400">Ankunft: 10:30 Uhr</p>

                            <div class="mt-2 inline-block bg-gray-100 dark:bg-gray-700 p-2 rounded-sm text-sm">
                                <p class="text-gray-800 dark:text-gray-200">
                                    <span data-key="diary.stay_time">Aufenthaltszeit</span>: 45 Min.
                                </p>
                            </div>
                        </li>

                        <li class="pl-6 relative">
                            <div class="absolute w-4 h-4 bg-red-600 rounded-full border-2 border-white dark:border-gray-800 -left-[9px] top-1">
                            </div>

                            <h3 class="font-bold text-gray-900 dark:text-white">Thun</h3>
                            <p class="text-sm text-gray-600 dark:text-gray-400">Ankunft: 11:45 Uhr</p>
                        </li>

                    </ul>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="shadow-md bg-white dark:bg-gray-800 rounded-xl p-2 h-[500px] lg:h-[600px] flex flex-col">
                    <div id="map"
                         class="w-full h-full bg-gray-200 dark:bg-gray-700 rounded-lg flex items-center justify-center">
                        <p class="text-gray-500 dark:text-gray-400"
                           data-key="diary.map_placeholder">Karte wird
                            geladen...</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- footer -->
    <footer id="footer"></footer>

    <!-- cookie banner -->
    <div id="cookieBanner"></div>

    <!-- Modals -->
    <div id="loginModalContainer"></div>
    <div id="signupModalContainer"></div>
    <div id="forgotModalContainer"></div>
    <div id="resetPasswordModalContainer"></div>

    <!-- Scripts -->
    <script src="js/page-elements/header.js"></script>
    <script src="js/page-elements/footer.js"></script>
    <script src="js/page-elements/cookie-banner.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/translation.js"></script>
    <script src="js/script.js"></script>
    <script type="module"
            src="js/firebase/firebase-init.js"></script>
    <script type="module"
            src="js/firebase/ui/auth-ui.js"></script>
    <script type="module"
            src="js/firebase/ui/profile-ui.js"></script>
    <script type="module"
            src="js/firebase/ui/diary-ui.js"></script>
</body>

</html>
