<!doctype html>
<html class="scroll-smooth no-copy" lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title data-key="index.meta.title">
        Roll the Track Dice - Your Random Train Adventure
    </title>
    <meta name="index.meta.description" data-key="meta_description"
        content="Experience a thrilling random adventure with the Track Dice!" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://app.gleiswuerfeln.ch/" />
    <link rel="alternate" hreflang="de" href="https://app.gleiswuerfeln.ch/" />
    <link rel="alternate" hreflang="en" href="https://app.gleiswuerfeln.ch/?lang=en" />
    <link rel="alternate" hreflang="fr" href="https://app.gleiswuerfeln.ch/?lang=fr" />
    <link rel="alternate" hreflang="it" href="https://app.gleiswuerfeln.ch/?lang=it" />
    <link rel="alternate" hreflang="x-default" href="https://app.gleiswuerfeln.ch/?lang=en" />

    <link rel="icon" type="image/svg+xml" href="img/logo-track-dice.svg" />

    <link rel="manifest" href="manifest.json" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Track Dice" />
    <link rel="apple-touch-icon" href="img/logo-512.png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" data-key="index.meta.title" content="Roll the Track Dice - Your Random Train Adventure" />
    <meta property="og:description" data-key="index.meta.description"
        content="Experience a thrilling random adventure with the Track Dice!" />
    <meta property="og:url" content="https://app.gleiswuerfeln.ch/" />
    <meta property="og:image" content="https://app.gleiswuerfeln.ch/img/track-dice.jpg" />
    <meta property="og:locale" data-key="meta_locale" content="de_CH" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400..900&display=swap" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @custom-variant dark (&:where(.dark, .dark *));
            @theme {
                --font-sans: "Maven Pro", sans-serif;
            }
        </style>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="font-sans flex flex-col min-h-screen bg-gray-100 dark:bg-gray-900">
    <!-- navigation -->
    <header id="header"></header>
    <!-- main content -->

    <main class="flex-grow max-w-7xl w-full mx-auto pt-8 pb-8 px-4 space-y-8">

        <!-- Kopfbereich mit Titel und Knopf für eine neue Reise -->
        <div
            class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 border-b border-gray-200 dark:border-gray-700 pb-4">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 dark:text-white uppercase tracking-wide">
                <span data-key="profile.title">Meine Reisen</span>
            </h1>
            <button id="btnProfileCreateTrip"
                class="bg-red-600 hover:bg-red-700 text-white rounded-sm px-5 py-2.5 text-sm font-medium transition cursor-pointer">
                <span data-key="profile.create_btn">Neue Reise erstellen</span>
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="profile-trips-list">

            <div
                class="shadow-md bg-white dark:bg-gray-800 rounded-xl p-6 border-t-4 border-red-600 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="text-xl font-bold text-gray-900 dark:text-white">Sommerausflug</h3>

                            <div class="flex items-center space-x-2 mt-1">
                                <span class="text-xs text-gray-500 dark:text-gray-400"
                                    data-key="profile.trip_coop">Mit:</span>
                                <div class="flex -space-x-1.5">
                                    <img class="inline-block h-6 w-6 rounded-full ring-2 ring-white dark:ring-gray-800 object-cover"
                                        src="https://images.unsplash.com/photo-1491528323818-fdd1faba62cc?w=100&h=100&fit=crop"
                                        alt="User">
                                    <img class="inline-block h-6 w-6 rounded-full ring-2 ring-white dark:ring-gray-800 object-cover"
                                        src="https://images.unsplash.com/photo-1550525811-e5869dd03032?w=100&h=100&fit=crop"
                                        alt="User">
                                    <img class="inline-block h-6 w-6 rounded-full ring-2 ring-white dark:ring-gray-800 object-cover"
                                        src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=100&h=100&fit=crop"
                                        alt="User">
                                </div>
                            </div>
                        </div>
                        <span
                            class="bg-red-100 text-red-800 text-xs font-medium px-2.5 py-0.5 rounded dark:bg-red-900 dark:text-red-300"
                            data-key="profile.badge_active">Aktiv</span>
                    </div>
                    <p class="text-sm text-gray-600 dark:text-gray-400 mb-4 mt-2">Letzte Station: Bern</p>
                </div>

                <div class="flex items-center gap-2 mt-4">

                    <button
                        class="flex-grow bg-red-600 hover:bg-red-700 text-white rounded-sm px-4 py-2 text-sm font-medium transition cursor-pointer text-center whitespace-nowrap">
                        <span data-key="profile.btn_continue">Weiter spielen</span>
                    </button>

                    <button
                        class="p-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-900 dark:text-white rounded-sm transition cursor-pointer flex-shrink-0"
                        title="Einladen">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                        </svg>
                        <span class="sr-only" data-key="profile.btn_invite">Einladen</span>
                    </button>

                    <button
                        class="p-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-900 dark:text-white rounded-sm transition cursor-pointer flex-shrink-0"
                        title="Bearbeiten">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                        </svg>
                        <span class="sr-only" data-key="profile.btn_edit">Bearbeiten</span>
                    </button>

                    <button
                        class="p-2 bg-red-100 text-red-700 hover:bg-red-200 dark:bg-red-900/30 dark:text-red-400 dark:hover:bg-red-900/50 rounded-sm transition cursor-pointer flex-shrink-0"
                        title="Löschen">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                        <span class="sr-only" data-key="profile.btn_delete">Löschen</span>
                    </button>

                </div>
            </div>

            <div
                class="shadow-md bg-white dark:bg-gray-800 rounded-xl p-6 border-t-4 border-gray-300 dark:border-gray-600 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="text-xl font-bold text-gray-900 dark:text-white">Wintertour</h3>

                            <div class="mt-1">
                                <span
                                    class="text-xs bg-gray-100 dark:bg-gray-750 text-gray-600 dark:text-gray-400 px-2 py-0.5 rounded-sm"
                                    data-key="profile.trip_solo">
                                    Allein unterwegs
                                </span>
                            </div>
                        </div>
                    </div>
                    <p class="text-sm text-gray-600 dark:text-gray-400 mb-4 mt-2">Letzte Station: Zürich</p>
                </div>

                <div class="flex items-center gap-2 mt-4">

                    <button
                        class="flex-grow bg-red-600 hover:bg-red-700 text-white rounded-sm px-4 py-2 text-sm font-medium transition cursor-pointer text-center whitespace-nowrap">
                        <span data-key="profile.btn_continue">Weiter spielen</span>
                    </button>

                    <button
                        class="p-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-900 dark:text-white rounded-sm transition cursor-pointer flex-shrink-0"
                        title="Einladen">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                        </svg>
                        <span class="sr-only" data-key="profile.btn_invite">Einladen</span>
                    </button>

                    <button
                        class="p-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-900 dark:text-white rounded-sm transition cursor-pointer flex-shrink-0"
                        title="Bearbeiten">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                        </svg>
                        <span class="sr-only" data-key="profile.btn_edit">Bearbeiten</span>
                    </button>

                    <button
                        class="p-2 bg-red-100 text-red-700 hover:bg-red-200 dark:bg-red-900/30 dark:text-red-400 dark:hover:bg-red-900/50 rounded-sm transition cursor-pointer flex-shrink-0"
                        title="Löschen">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                        <span class="sr-only" data-key="profile.btn_delete">Löschen</span>
                    </button>

                </div>
            </div>

        </div>
    </main>

    <!-- footer -->
    <footer id="footer"></footer>

    <!-- cookie banner -->
    <div id="cookieBanner"></div>

    <!-- Modals -->
    <div id="loginModalContainer"></div>
    <div id="signupModalContainer"></div>
    <div id="forgotModalContainer"></div>
    <div id="resetPasswordModalContainer"></div>

    <!-- Scripts -->
    <script src="js/page-elements/header.js"></script>
    <script src="js/page-elements/footer.js"></script>
    <script src="js/page-elements/cookie-banner.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/translation.js"></script>
    <script src="js/script.js"></script>
    <script type="module" src="js/firebase/firebase-init.js"></script>
    <script type="module" src="js/firebase/ui/auth-ui.js"></script>
    <script type="module" src="js/firebase/ui/profile-ui.js"></script>
</body>

</html>
