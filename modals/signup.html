<div
    id="signupModal"
    class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4 backdrop-blur-md"
>
    <div
        class="w-full max-w-md shadow-md bg-white dark:bg-gray-800 rounded-xl p-8 space-y-4 relative"
    >
        <button
            id="closeSignupBtn"
            class="absolute top-4 right-4 text-gray-500 hover:text-gray-700 dark:hover:text-white cursor-pointer"
        >
            <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-6"
            >
                <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M6 18 18 6M6 6l12 12"
                />
            </svg>
        </button>

        <h2
            data-key="signup.title"
            class="text-2xl font-bold text-gray-900 dark:text-white mb-6 uppercase text-center"
        >
            signup.title
        </h2>

        <form id="signupForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label
                        data-key="signup.firstname"
                        class="block text-sm font-medium text-red-600 dark:text-white mb-1"
                        >signup.firstname</label
                    >
                    <input
                        type="text"
                        id="signupVorname"
                        required
                        class="w-full px-5 py-2.5 rounded-sm border border-gray-900 dark:border-gray-100 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-gray-900 dark:focus:ring-gray-100"
                    />
                </div>
                <div>
                    <label
                        data-key="signup.lastname"
                        class="block text-sm font-medium text-red-600 dark:text-white mb-1"
                        >signup.lastname</label
                    >
                    <input
                        type="text"
                        id="signupNachname"
                        required
                        class="w-full px-5 py-2.5 rounded-sm border border-gray-900 dark:border-gray-100 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-gray-900 dark:focus:ring-gray-100"
                    />
                </div>
            </div>
            <div>
                <label
                    data-key="signup.email"
                    class="block text-sm font-medium text-red-600 dark:text-white mb-1"
                    >signup.email</label
                >
                <input
                    type="email"
                    id="signupEmail"
                    required
                    class="w-full px-5 py-2.5 rounded-sm border border-gray-900 dark:border-gray-100 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-gray-900 dark:focus:ring-gray-100"
                />
            </div>

            <div>
                <label
                    data-key="signup.password"
                    class="block text-sm font-medium text-red-600 dark:text-white mb-1"
                    >signup.password</label
                >
                <div class="relative">
                    <input
                        type="password"
                        id="signupPassword"
                        required
                        class="w-full px-5 py-2.5 rounded-sm border border-gray-900 dark:border-gray-100 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-gray-900 dark:focus:ring-gray-100"
                    />

                    <button
                        type="button"
                        onclick="
                            togglePasswordVisibility(
                                'signupPassword',
                                'signupPasswordToggleText',
                            )
                        "
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5 text-gray-600 dark:text-gray-300 cursor-pointer"
                    >
                        <span id="signupPasswordToggleText">Show</span>
                    </button>
                </div>
                <p
                    data-key="signup.passwordinfo"
                    class="text-xs text-gray-900 dark:text-white text-pretty"
                >
                    signup.passwordinfo
                </p>
            </div>

            <button
                type="submit"
                data-key="signup.btn"
                class="w-full text-center bg-red-600 hover:bg-red-700 text-white rounded-sm px-5 py-2.5 text-sm font-medium transition"
            >
                signup.btn
            </button>
        </form>

        <p
            class="text-sm text-center text-gray-900 dark:text-white text-pretty mt-4"
        >
            <span data-key="signup.switch" class="mr-4">signup.switch</span>
            <button
                data-key="signup.switchbtn"
                id="switchToLogin"
                class="text-red-600 hover:underline cursor-pointer"
            >
                signup.switchbtn
            </button>
        </p>
    </div>
</div>
